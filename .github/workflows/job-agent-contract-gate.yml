name: Job-Agent Contract Gate

on:
  pull_request:
    paths:
      - ".github/workflows/job-agent-contract-gate.yml"
      - ".npmrc"
      - "CONTEXT.md"
      - "docs/adr/**"
      - "docs/issues/**"
      - "docs/job-agent/**"
      - "docs/ci/**"
      - "docs/prd/**"
      - "installer/**"
      - "package.json"
      - "packages/geek-auto-start-chat-with-boss/**"
      - "packages/job-agent-cli/**"
      - "packages/job-agent-sidecar/**"
      - "packages/laodeng/**"
      - "packages/sqlite-plugin/**"
      - "packages/utils/**"
      - "patches/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/job-agent-contract-gate.yml"
      - ".npmrc"
      - "CONTEXT.md"
      - "docs/adr/**"
      - "docs/issues/**"
      - "docs/job-agent/**"
      - "docs/ci/**"
      - "docs/prd/**"
      - "installer/**"
      - "package.json"
      - "packages/geek-auto-start-chat-with-boss/**"
      - "packages/job-agent-cli/**"
      - "packages/job-agent-sidecar/**"
      - "packages/laodeng/**"
      - "packages/sqlite-plugin/**"
      - "packages/utils/**"
      - "patches/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/**"

permissions:
  contents: read

concurrency:
  group: job-agent-contract-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  job-agent-cli:
    name: job-agent-cli
    runs-on: ubuntu-22.04
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check CLI syntax
        run: pnpm --filter @geekgeekrun/job-agent-cli check

      - name: Test CLI
        run: pnpm --filter @geekgeekrun/job-agent-cli test

  job-agent-sidecar:
    name: job-agent-sidecar
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/job-agent-sidecar/pyproject.toml

      - name: Install sidecar test dependencies
        working-directory: packages/job-agent-sidecar
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Test sidecar
        working-directory: packages/job-agent-sidecar
        run: python -m pytest

  job-agent-distribution-build-windows:
    name: job-agent-distribution-build-windows
    runs-on: windows-2022
    needs:
      - job-agent-cli
      - job-agent-sidecar
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.16.0
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/job-agent-sidecar/pyproject.toml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Test portable bundle tooling
        run: pnpm test:job-agent-portable

      - name: Build and smoke-test portable bundle
        run: pnpm build:job-agent-portable

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build per-user installer
        run: pnpm build:job-agent-installer

      - name: Download and verify pinned browser gate fixture
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/download-job-agent-browser-fixture.ps1

      - name: Upload Windows distribution candidate
        uses: actions/upload-artifact@v4
        with:
          name: geekgeekrun-job-agent-windows-x64-candidate
          path: |
            artifacts/job-agent-portable/*.zip
            artifacts/job-agent-installer/*.exe
            artifacts/job-agent-browser-fixture/*.zip
          if-no-files-found: error

  job-agent-installed-product-windows:
    name: job-agent-distribution-windows
    runs-on: windows-2022
    needs:
      - job-agent-distribution-build-windows
    steps:
      - name: Checkout installed-product test fixtures
        uses: actions/checkout@v4

      - name: Download Windows distribution candidate
        uses: actions/download-artifact@v4
        with:
          name: geekgeekrun-job-agent-windows-x64-candidate
          path: artifacts

      - name: Run isolated installed-product lifecycle gate
        shell: powershell
        run: |
          $installer = Get-ChildItem artifacts -Recurse -Filter *.exe | Where-Object Name -like '*-setup.exe' | Select-Object -First 1
          $browserArchive = Get-ChildItem artifacts -Recurse -Filter chrome-win64.zip | Select-Object -First 1
          if (-not $installer) { throw "Job Agent installer candidate was not downloaded" }
          if (-not $browserArchive) { throw "Pinned browser gate fixture was not downloaded" }
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-test-job-agent-installer.ps1 -InstallerPath $installer.FullName -BrowserArchivePath $browserArchive.FullName
