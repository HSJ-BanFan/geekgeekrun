[project]
name = "geekgeekrun-job-agent-sidecar"
version = "0.1.0"
description = "Python supervisory sidecar for the GeekGeekRun JSON-first Node CLI"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0",
]

[project.optional-dependencies]
agents = [
  "openai-agents>=0.2.0",
]
test = [
  "pytest>=8.0",
]

[project.scripts]
ggr-sidecar = "ggr_sidecar.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
